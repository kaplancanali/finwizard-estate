name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DATABASE_URL: sqlite+aiosqlite:///:memory:
  APP_ENV: development

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Pytest unit
        run: python -m pytest tests/unit -q

  integration-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Pytest integration
        run: python -m pytest tests/integration -q
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          APP_ENV: ${{ env.APP_ENV }}

  build-image:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/Dockerfile --target runtime -t property-service:${{ github.sha }} .
      - name: Build worker image
        run: docker build -f docker/Dockerfile.worker --target runtime -t property-service-worker:${{ github.sha }} .

  # Deployment jobs are environment-gated; wire ECR push + helm upgrade in infrastructure repo.
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to dev (placeholder)
        run: |
          echo "Auto-deploy to dev: helm upgrade --install property-service deploy/helm/property-service -f deploy/helm/property-service/values-dev.yaml"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging (manual approval gate)
        run: |
          echo "Manual approval required — helm upgrade with values-staging.yaml"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production (canary)
        run: |
          echo "Manual approval + canary rollout: 10% → 50% → 100%"
