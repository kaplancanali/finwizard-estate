apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "property-service.fullname" . }}-api
  labels:
    {{- include "property-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.api.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.api.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      {{- include "property-service.apiLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "property-service.apiLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ default (include "property-service.fullname" .) .Values.serviceAccount.name }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: {{ include "property-service.image" (dict "Values" .Values.image "Chart" .Chart "Release" .Release "global" .Values.global) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          envFrom:
            {{- include "property-service.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
          startupProbe:
            httpGet:
              path: {{ .Values.api.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.api.probes.startup.failureThreshold }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.api.preStopSleepSeconds }}
          command:
            - uvicorn
            - property_service.main:app
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.api.port | quote }}
            - --workers
            - "4"
