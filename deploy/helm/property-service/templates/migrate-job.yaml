{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "property-service.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "property-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "property-service.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ default (include "property-service.fullname" .) .Values.serviceAccount.name }}
      containers:
        - name: migrate
          image: {{ include "property-service.image" (dict "Values" .Values.image "Chart" .Chart "Release" .Release "global" .Values.global) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            {{- include "property-service.envFrom" . | nindent 12 }}
          command:
            - alembic
            - upgrade
            - head
{{- end }}
