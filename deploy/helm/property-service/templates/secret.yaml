apiVersion: v1
kind: Secret
metadata:
  name: {{ include "property-service.fullname" . }}-secrets
  labels:
    {{- include "property-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl is required" .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ required "secrets.redisUrl is required" .Values.secrets.redisUrl | quote }}
  RABBITMQ_URL: {{ required "secrets.rabbitmqUrl is required" .Values.secrets.rabbitmqUrl | quote }}
  JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
