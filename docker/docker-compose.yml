services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    ports:
      - "8001:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://property:property@postgres:5432/property_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://property:property@rabbitmq:5672/
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: property-media
      JWT_SECRET: dev-secret-change-in-production
      JWT_ALGORITHM: HS256
      REQUIRE_AUTHENTICATION: "false"
      RUN_MIGRATIONS: "true"
      SEED_LOOKUPS: "true"
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ../src:/app/src
    command: >
      python -m uvicorn property_service.main:app
      --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      target: runtime
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://property:property@postgres:5432/property_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://property:property@rabbitmq:5672/
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: property-media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ../src:/app/src

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      target: runtime
    command: >
      python -m celery -A property_service.infrastructure.celery.app beat
      --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://property:property@postgres:5432/property_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://property:property@rabbitmq:5672/
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    environment:
      POSTGRES_USER: property
      POSTGRES_PASSWORD: property
      POSTGRES_DB: property_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U property -d property_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: property
      RABBITMQ_DEFAULT_PASS: property
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/property-media;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
